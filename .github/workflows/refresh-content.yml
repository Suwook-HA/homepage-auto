name: Refresh Homepage Content

on:
  schedule:
    # Daily at 00:00 UTC (09:00 KST)
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: homepage-refresh
  cancel-in-progress: false

jobs:
  refresh:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Select refresh mode
        id: mode
        env:
          HOMEPAGE_URL: ${{ secrets.HOMEPAGE_URL }}
        run: |
          if [ -n "$HOMEPAGE_URL" ] && [[ "$HOMEPAGE_URL" != *"github.io"* ]]; then
            echo "mode=api" >> "$GITHUB_OUTPUT"
            echo "Using API mode"
          else
            echo "mode=static" >> "$GITHUB_OUTPUT"
            echo "Using static mode"
          fi

      - name: Call refresh API (server mode)
        if: steps.mode.outputs.mode == 'api'
        env:
          HOMEPAGE_URL: ${{ secrets.HOMEPAGE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          endpoint="$HOMEPAGE_URL/api/refresh?trigger=cron"
          echo "POST $endpoint"

          if [ -n "$CRON_SECRET" ]; then
            curl --fail --show-error --silent \
              --max-time 20 \
              -X POST \
              -H "x-cron-secret: $CRON_SECRET" \
              "$endpoint"
          else
            curl --fail --show-error --silent \
              --max-time 20 \
              -X POST \
              "$endpoint"
          fi

      - name: Refresh static content data (pages mode)
        if: steps.mode.outputs.mode == 'static'
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run refresh:static

      - name: Commit refreshed content data
        if: steps.mode.outputs.mode == 'static'
        run: |
          if git diff --quiet -- data/content.json; then
            echo "No content data changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/content.json
          git commit -m "chore: daily content refresh"
          git push

      - name: Build static pages artifact
        if: steps.mode.outputs.mode == 'static'
        run: npm run build:pages

      - name: Setup Pages
        if: steps.mode.outputs.mode == 'static'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.mode.outputs.mode == 'static'
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-dist

      - name: Deploy to GitHub Pages
        if: steps.mode.outputs.mode == 'static'
        id: deployment
        uses: actions/deploy-pages@v4
